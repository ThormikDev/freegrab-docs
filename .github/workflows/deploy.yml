name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Run all JavaScript actions on Node 24 (silences the Node 20 deprecation and
# matches the local toolchain).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress production deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          node-version: 24   # Astro 6 requires Node >=22.12; pin to current LTS (matches local)
        # Defaults: installs deps, runs `astro build`, uploads ./dist as a Pages artifact.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
